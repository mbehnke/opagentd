[security]
default_level = "confirm"
allowed_paths = ["/home", "/tmp", "/var/tmp"]
denied_commands = ["rm -rf /", "dd", "> /dev/sda", "mkfs"]

[socket]
path = "/run/opagentd/opagentd.sock"
permissions = 432

[logging]
level = "info"
audit_log = "/var/log/opagentd/audit.jsonl"

[agent]
shell_enabled = true
file_enabled = true
git_enabled = true

[llm]
# Provider: "deepseek", "openai", "ollama", or "custom"
provider = "deepseek"
# Model name
model = "deepseek-chat"
# Override default API base URL (optional; provider defaults are used)
# base_url = "https://api.deepseek.com"
# API key — set here or via env var (DEEPSEEK_API_KEY, OPENAI_API_KEY, OPAGENTD_API_KEY)
# api_key = "sk-..." 
temperature = 0.7
# max_tokens = 4096
enabled = true
